server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:sqlite:data/pernet.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  task:
    scheduling:
      pool:
        size: 2

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

app:
  upload:
    path: ${user.dir}/uploads
  jwt:
    secret: PerNetBlog2025SecretKey!ChangeInProduction
    expiration: 86400000
  admin:
    default-username: admin
    default-password: admin123
    default-nickname: Admin
  cache:
    profile-ttl: 1800000
    categories-ttl: 600000
    tags-ttl: 600000
    article-ttl: 300000
